  .pb-amazon { background: #fff8e6; color: #c07000; }
  .pb-ohouse { background: #e6f0ff; color: #2563eb; }

function init(){
  const t=new Date();
  document.getElementById('stat-date').textContent=`${t.getFullYear()}.${t.getMonth()+1}`;
  document.getElementById('stat-total').textContent=DATA.length;
  const tabs=document.getElementById('cat-tabs');
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c==='전체'?' active':'');
    b.textContent=c;
    b.onclick=()=>select(c,b);
    tabs.appendChild(b);
  });
  render('전체');
}

function select(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-title').textContent=cat;
  document.getElementById('source-note').textContent=CAT_SRC[cat]||'';
  render(cat);
}

function render(cat){
  const g=document.getElementById('card-grid');
  g.innerHTML='';
  const list=cat==='전체'?DATA:DATA.filter(d=>d.c===cat);
  list.forEach((item,i)=>{
    const r=i+1;
    const rc=r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-other';
    const url=SEARCH_URL[item.p](item.q);
    const badge=item.badge?`<div class="card-badge">📌 ${item.badge}</div>`:'';
    const a=document.createElement('a');
    a.className='card';a.href=url;a.target='_blank';a.rel='noopener noreferrer';
    a.innerHTML=`
      <div class="card-top">
        <span class="rank-badge ${rc}">${r}</span>
        <span class="platform-badge pb-${item.p}">${PL[item.p]}</span>
      </div>
      <div class="card-name">${item.n}</div>
      ${badge}
      <div class="card-reason">${item.r}</div>
      <div class="card-source">출처: ${item.src}</div>
      <div class="card-arrow">검색 결과 보기 →</div>
    `;
    g.appendChild(a);
  });
}
init();
</script>
